<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — avRoN Tech</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;}
body{font-family:'Inter',sans-serif;background:#0B192C;color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(96,139,193,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,139,193,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
body::after{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(96,139,193,.18),transparent 70%);top:-200px;right:-200px;pointer-events:none;}
.card{position:relative;background:#0e2138;border:1px solid #1a2c4a;border-radius:14px;padding:42px 44px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.4);}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:30px;}
.brand-mark{width:52px;height:52px;display:flex;align-items:center;justify-content:center;}
.brand-mark img{width:52px;height:52px;object-fit:contain;}
@media(max-width:480px){.brand-mark{width:36px;height:36px;}.brand-mark img{width:36px;height:36px;}.brand-name-img{height:32px !important;margin-left:-6px !important;}}
.brand-name{font-family:'Sora',sans-serif;font-weight:800;line-height:1.1;}
.brand-name .bn-sm{font-size:15px;color:#fff;}
.brand-name .bn-lg{font-size:22px;color:#608BC1;}
.brand-sub{font-size:11px;color:#7186a0;letter-spacing:.04em;font-weight:500;margin-top:2px;}
.tag{display:inline-block;font-size:11px;font-weight:700;color:#608BC1;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
h1{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:#fff;letter-spacing:-.4px;}
.sub{font-size:13.5px;color:#9eb2c8;margin-top:8px;line-height:1.6;}
.fg{margin-top:22px;}
label{display:block;font-size:12px;color:#9eb2c8;font-weight:600;margin-bottom:7px;letter-spacing:.02em;}
.fi{width:100%;padding:13px 14px;background:#152844;border:1px solid #1a2c4a;color:#fff;font-size:14px;font-family:inherit;transition:all .2s;}
.fi:focus{outline:none;border-color:#608BC1;background:#1a2e4f;box-shadow:0 0 0 3px rgba(96,139,193,.15);}
.fi::placeholder{color:#5a7396;}
.err{display:none;font-size:12.5px;color:#fda4af;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);padding:9px 12px;border-radius:7px;margin-top:14px;}
.btn{width:100%;background:#608BC1;color:#0B192C;border:none;padding:13px;font-size:14.5px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.btn:hover:not(:disabled){background:#7ba0d4;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.spin{display:none;width:14px;height:14px;border:2px solid rgba(11,25,44,.3);border-top-color:#0B192C;border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.foot{text-align:center;margin-top:22px;font-size:12.5px;color:#7186a0;}
.foot a{color:#608BC1;text-decoration:none;}
@media (max-width:480px){
  body{padding:16px;overflow-x:hidden;}
  body::after{display:none;}
  .card{padding:28px 22px;border-radius:10px;}
  h1{font-size:20px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-mark"><img src="/logo.png" alt="avRoN Technologies"></div>
    <img src="/brand-name.png" alt="avRoN Technologies" class="brand-name-img" style="height:48px;object-fit:contain;display:block;margin-left:-14px;">
  </div>

  <span class="tag">Admin Panel</span>
  <h1>Secure Login</h1>
  <p class="sub">Authenticate with your admin credentials to access the avRoN Tech admin console.</p>

  <div class="fg">
    <label>Admin Email</label>
    <input type="email" class="fi" id="email" placeholder="admin@avrontech.in" autocomplete="username" data-testid="admin-email">
  </div>
  <div class="fg">
    <label>Password</label>
    <input type="password" class="fi" id="password" placeholder="Enter password" autocomplete="current-password" data-testid="admin-password" onkeydown="if(event.key==='Enter')login()">
  </div>

  <div class="err" id="errMsg">—</div>

  <button class="btn" id="loginBtn" onclick="login()" data-testid="admin-login-btn">
    <span id="btnTxt">Sign in to Admin Console →</span>
    <div class="spin" id="spin"></div>
  </button>

  <div class="foot">
    Not an admin? <a href="/">Back to home</a>
  </div>
</div>

<script>
const t = localStorage.getItem('avr_admin_token');
if(t) location.href='/admin/dashboard';

async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('errMsg');
  errEl.style.display='none';
  if(!email || !password){errEl.textContent='Email and password required.';errEl.style.display='block';return;}
  const btn = document.getElementById('loginBtn'),
        sp  = document.getElementById('spin'),
        bt  = document.getElementById('btnTxt');
  btn.disabled = true; sp.style.display='block'; bt.textContent='Signing in...';
  try{
    const res = await fetch('/api/auth/admin/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d = await res.json();
    if(d.success){
     localStorage.setItem('avr_admin_token', d.token);
  localStorage.setItem('avr_admin_user', JSON.stringify(d.admin));
  location.href='/admin/dashboard';
    }else{
      errEl.textContent = d.message || 'Login failed.';errEl.style.display='block';
      btn.disabled=false; sp.style.display='none'; bt.textContent='Sign in to Admin Console →';
    }
  }catch{
    errEl.textContent='Network error.';errEl.style.display='block';
    btn.disabled=false; sp.style.display='none'; bt.textContent='Sign in to Admin Console →';
  }
}
</script>
</body>
</html>
